unbind r
bind r source-file ~/.tmux.conf

set -g prefix C-s

set -g mouse on

setw -g mode-keys vi
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux#v2.3.0'

set -g default-terminal "tmux-256color"

# Configure the catppuccin plugin
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"

# Make the status line pretty and add some modules
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_battery}"

set -g @catppuccin_date_time_text " %H:%M"
set -g @catppuccin_window_default_text " #W"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"
set -agF status-right "#{E:@catppuccin_status_date_time}"

set -g status-position top

# NOTE: I'm not using tpm anymore. Found some issues with it. Instead, clone the plugin to ~/.tmux/plugins/ and then include a run statement like I've done for the plugins below.
run ~/.tmux/plugins/catppuccin/tmux/catppuccin.tmux
run ~/.tmux/plugins/tmux-battery/battery.tmux


bind  c  new-window      -c "#{pane_current_path}"
bind  %  split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"

